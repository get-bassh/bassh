name = "bassh-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# Keep the workers.dev URL alive as a fallback so already-installed CLIs
# (BASSH_API still pointing at bassh-api.bassh.workers.dev) keep working
# while connect.bassh.io rolls out as the primary endpoint.
workers_dev = true
# account_id is read from `wrangler login` or the CLOUDFLARE_ACCOUNT_ID env var.
# Do NOT commit a hard-coded account_id here — forks would deploy into your account.

# You'll set these after deploying:
# wrangler secret put CF_API_TOKEN
# wrangler secret put CF_ACCOUNT_ID
# wrangler secret put REGISTRATION_CODE  (optional, for invite-only registration)

[vars]
# Non-sensitive config can go here

# Custom domain: connect.bassh.io serves the worker (signup, dashboard, OAuth,
# /mcp, /connect, decrypt gates). bassh.io itself stays on its own static
# marketing deploy and links over to here for sign-up. The workers.dev URL
# keeps responding too, so deploys are non-breaking during DNS propagation.
[[routes]]
pattern = "connect.bassh.io"
custom_domain = true

[[kv_namespaces]]
binding = "USERS"
id = "6f2b0c44791b43519a5c06a47fb43c56"

[[kv_namespaces]]
binding = "FORMS"
id = "2560c390c6a84c42bc1ed03107b3c68c"

# Email sending for magic links (optional - for -o flag)
# Requires Resend account: https://resend.com
# Set secrets: RESEND_API_KEY, EMAIL_FROM
